name: management-stack

networks:
    default:
        name: home-net
        external: true

x-logging: &default-logging
    driver: json-file
    options:
        max-size: "10m"
        max-file: "3"

services:
    dash:
        image: mauricenino/dashdot:latest
        container_name: dash
        privileged: true
        environment:
            DASHDOT_WIDGET_LIST: 'os,cpu,ram,storage,network'
            DASHDOT_ENABLE_CPU_TEMPS: 'true'
            DASHDOT_OVERRIDE_RAM_BRAND: 'G.SKILL Ripjaws V'
            DASHDOT_SHOW_HOST: 'true'
            DASHDOT_CUSTOM_HOST: 'Homelab'
            DASHDOT_OS_WIDGET_GROW: '1'
            DASHDOT_STORAGE_WIDGET_ITEMS_PER_PAGE: '5'
            DASHDOT_STORAGE_WIDGET_GROW: '5'
            DASHDOT_NETWORK_WIDGET_GROW: '4'
            DASHDOT_ALWAYS_SHOW_PERCENTAGES: 'true'
            DASHDOT_NETWORK_SPEED_AS_BYTES: 'true'
        volumes:
            - /:/mnt/host:ro
        ports:
            - "${DASHDOT_PORT:-4001}:3001"
        logging: *default-logging
        restart: unless-stopped

    homarr:
        image: ghcr.io/homarr-labs/homarr:latest
        container_name: homarr
        environment:
            TZ: ${TZ}
            SECRET_ENCRYPTION_KEY: ${HOMARR_ENCRYPTION_KEY}
        volumes:
            - ./homarr:/appdata
            - /var/run/docker.sock:/var/run/docker.sock
        ports:
            - "${HOMARR_PORT:-4002}:7575"
        logging: *default-logging
        restart: unless-stopped
        
    portainer:
        image: portainer/portainer-ce:latest
        container_name: portainer
        environment:
            TZ: ${TZ}
        volumes:
            - ./portainer:/data
            - /var/run/docker.sock:/var/run/docker.sock
        ports:
            - "${PORTAINER_PORT:-4003}:9443"
        logging: *default-logging
        restart: unless-stopped
        
    uptime-kuma:
        image: louislam/uptime-kuma:2
        container_name: uptime-kuma
        environment:
            TZ: ${TZ}
        volumes:
            - ./uptime-kuma:/app/data
        ports:
            - "${UPTIME_KUMA_PORT:-4004}:3001"
        logging: *default-logging
        restart: unless-stopped

    watchtower:
        image: nickfedor/watchtower
        container_name: watchtower
        environment:
            LOG_LEVEL: info
            TZ: ${TZ}
            WATCHTOWER_CLEANUP: true
            WATCHTOWER_REMOVE_VOLUMES: false
            WATCHTOWER_LOG_LEVEL: info
            WATCHTOWER_POLL_INTERVAL: 86400
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        logging: *default-logging
        restart: unless-stopped
