<body>
    <h1>Game Servers</h1>

    {% for server in servers %}
        <section>
            <h2>{{ server.name }}</h2>

            <ul>
                <li>Slug: {{ server.slug }}</li>
                <li>Version: {{ server.version }}</li>
                <li>Memory: {{ server.memory }}</li>
                <li>Port: {{ server.port }}</li>
                <li>Status: {{ server.status }}</li>
            </ul>
        </section>
    {% endfor %}
</body>
