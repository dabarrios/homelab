name: monitoring-stack

networks:
    default:
        name: home-net
        external: true

x-logging: &default-logging
    driver: json-file
    options:
        max-size: "10m"
        max-file: "3"

services:
    loki-read:
        image: grafana/loki:latest
        container_name: loki-read
        command:
            - -config.file=/etc/loki/config.yaml
            - -config.expand-env=true
            - -target=read
        volumes:
            - ./loki/loki-config.yaml:/etc/loki/config.yaml:ro
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        depends_on:
            - loki-minio
        healthcheck:
            test: ["CMD", "/usr/bin/loki", "-health"]
            start_period: 30s
            interval: 10s
            timeout: 5s
            retries: 5
        logging: *default-logging
        restart: unless-stopped

    loki-write:
        image: grafana/loki:latest
        container_name: loki-write
        command:
            - -config.file=/etc/loki/config.yaml
            - -config.expand-env=true
            - -target=write
        volumes:
            - ./loki/loki-config.yaml:/etc/loki/config.yaml:ro
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        depends_on:
            - loki-minio
        healthcheck:
            test: ["CMD", "/usr/bin/loki", "-health"]
            start_period: 30s
            interval: 10s
            timeout: 5s
            retries: 5
        logging: *default-logging
        restart: unless-stopped

    loki-backend:
        image: grafana/loki:latest
        container_name: loki-backend
        command:
            - -config.file=/etc/loki/config.yaml
            - -config.expand-env=true
            - -target=backend
            - -legacy-read-mode=false
        volumes:
            - ./loki/loki-config.yaml:/etc/loki/config.yaml:ro
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        depends_on:
            - loki-gateway
        healthcheck:
            test: ["CMD", "/usr/bin/loki", "-health"]
            start_period: 30s
            interval: 30s
            timeout: 10s
            retries: 5
        logging: *default-logging
        restart: unless-stopped

    loki-gateway:
        image: nginx:latest
        container_name: loki-gateway
        depends_on:
            - loki-read
            - loki-write
        entrypoint:
            - sh
            - -euc
            - |
                cat <<EOF > /etc/nginx/nginx.conf
                user  nginx;
                worker_processes  5;

                events {
                    worker_connections 1000;
                }

                http {
                    resolver 127.0.0.11;

                    server {
                        listen 3100;

                        location = / {
                            return 200 'OK';
                            auth_basic off;
                        }

                        location = /api/prom/push {
                            proxy_pass http://loki-write:3100\$$request_uri;
                        }

                        location = /api/prom/tail {
                            proxy_pass http://loki-read:3100\$$request_uri;
                            proxy_set_header Upgrade \$$http_upgrade;
                            proxy_set_header Connection "upgrade";
                        }

                        location ~ /api/prom/.* {
                            proxy_pass http://loki-read:3100\$$request_uri;
                        }

                        location = /loki/api/v1/push {
                            proxy_pass http://loki-write:3100\$$request_uri;
                        }

                        location = /loki/api/v1/tail {
                            proxy_pass http://loki-read:3100\$$request_uri;
                            proxy_set_header Upgrade \$$http_upgrade;
                            proxy_set_header Connection "upgrade";
                        }

                        location ~ /loki/api/.* {
                            proxy_pass http://loki-read:3100\$$request_uri;
                        }
                    }
                }
                EOF
                /docker-entrypoint.sh nginx -g "daemon off;"
        ports:
            - "${LOKI_GATEWAY_HOST_PORT:-4502}:3100"
        healthcheck:
            test: ["CMD", "service", "nginx", "status"]
            interval: 10s
            timeout: 5s
            retries: 5
        logging: *default-logging
        restart: unless-stopped

    alloy:
        image: grafana/alloy:latest
        container_name: alloy
        command:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
            - /etc/alloy/config.alloy
        volumes:
            - ./loki/alloy-local-config.yaml:/etc/alloy/config.alloy:ro
            - ./alloy/data:/var/lib/alloy/data
            - /var/run/docker.sock:/var/run/docker.sock:ro
        ports:
            - "${ALLOY_HOST_PORT:-4503}:12345"
        depends_on:
            - loki-gateway
        logging: *default-logging
        restart: unless-stopped

    loki-minio:
        image: minio/minio
        container_name: loki-minio
        entrypoint:
            - sh
            - -euc
            - |
                mkdir -p /data/loki-data && \
                mkdir -p /data/loki-ruler && \
                minio server /data
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
            MINIO_PROMETHEUS_AUTH_TYPE: public
            MINIO_UPDATE: off
        volumes:
            - ./.data/minio:/data
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 15s
            timeout: 20s
            retries: 5
        logging: *default-logging
        restart: unless-stopped

    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        user: "${PUID:-1000}:${PGID:-1000}"
        environment:
            TZ: ${TZ}
            GF_PATHS_PROVISIONING: /etc/grafana/provisioning
            GF_AUTH_ANONYMOUS_ENABLED: true
            GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
        volumes:
            - ./grafana/data:/var/lib/grafana
            - ./grafana/provisioning:/etc/grafana/provisioning:ro
        ports:
            - "${GRAFANA_HOST_PORT:-4501}:3000"
        depends_on:
            - loki-gateway
        healthcheck:
            test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
        logging: *default-logging
        restart: unless-stopped

    flog:
        image: mingrammer/flog
        container_name: flog
        command:
            - -f
            - json
            - -d
            - 200ms
            - -l
        logging: *default-logging
        restart: unless-stopped
