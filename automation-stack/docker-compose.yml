name: automation-stack
    
networks:
    default:
        name: home-net
        external: true

services:

# Movies/Shows/Anime Services
    radarr:
        image: lscr.io/linuxserver/radarr:latest
        container_name: radarr
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./radarr:/config
            - ${MOVIES_PATH}:/movies      
            - ${DOWNLOADS_PATH}:/downloads  
        ports:
            - ${RADARR_PORT:-6001}:7878
        restart: unless-stopped

    radarr-anime:
        image: lscr.io/linuxserver/radarr:latest
        container_name: radarr-anime
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./radarr-anime:/config
            - ${ANIME_MOVIES_PATH}:/anime_movies        
            - ${DOWNLOADS_PATH}:/downloads  
        ports:
            - ${RADARR_ANIME_PORT:-6002}:7878
        restart: unless-stopped

    sonarr:
        image: lscr.io/linuxserver/sonarr:latest
        container_name: sonarr
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./sonarr:/config
            - ${SHOWS_PATH}:/shows
            - ${DOWNLOADS_PATH}:/downloads  
        ports:
            - ${SONARR_PORT:-6003}:8989
        restart: unless-stopped

    sonarr-anime:
        image: lscr.io/linuxserver/sonarr:latest
        container_name: sonarr-anime
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./sonarr-anime:/config
            - ${ANIME_SERIES_PATH}:/anime_series
            - ${DOWNLOADS_PATH}:/downloads  
        ports:
            - ${SONARR_ANIME_PORT:-6004}:8989
        restart: unless-stopped

# Subtitle Services for Regular/Anime Media
    bazarr: 
        image: lscr.io/linuxserver/bazarr:latest
        container_name: bazarr
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./bazarr:/config
            - ${MOVIES_PATH}:/movies
            - ${SHOWS_PATH}:/shows
        ports:
            - ${BAZARR_PORT:-6005}:6767
        restart: unless-stopped

    bazarr-anime: 
        image: lscr.io/linuxserver/bazarr:latest
        container_name: bazarr-anime
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./bazarr-anime:/config
            - ${ANIME_MOVIES_PATH}:/anime_movies
            - ${ANIME_SERIES_PATH}:/anime_series
        ports:
            - ${BAZARR_ANIME_PORT:-6006}:6767
        restart: unless-stopped
        
# Indexing Services - Flaresolverr for Cloudflare
    prowlarr:
        image: lscr.io/linuxserver/prowlarr:latest
        container_name: prowlarr
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./prowlarr:/config
        ports:
            - ${PROWLARR_PORT:-6007}:9696
        restart: unless-stopped

    flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        container_name: flaresolverr
        environment:
            LOG_LEVEL: info
            LOG_HTML: false
            CAPTCHA_SOLVER: none
            TZ: ${TZ}
        volumes:
            - ./flaresolverr:/config
        restart: unless-stopped

# Quality Profile Configuration Service
    recyclarr:
        image: ghcr.io/recyclarr/recyclarr
        container_name: recyclarr
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./recyclarr:/config
        restart: unless-stopped