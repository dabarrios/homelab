name: automation-stack
    
networks:
    default:
        name: home-net
        external: true

x-logging: &default-logging
    driver: json-file
    options:
        max-size: "10m"
        max-file: "3"

services:

# Subtitle Services for Regular/Anime Media
    bazarr: 
        image: lscr.io/linuxserver/bazarr:latest
        container_name: bazarr
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./bazarr:/config
            - ${MOVIES_PATH}:/movies
            - ${SHOWS_PATH}:/shows
        ports:
            - "${BAZARR_HOST_PORT:-6001}:6767"
        logging: *default-logging
        restart: unless-stopped

    bazarr-anime: 
        image: lscr.io/linuxserver/bazarr:latest
        container_name: bazarr-anime
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./bazarr-anime:/config
            - ${ANIME_MOVIES_PATH}:/anime_movies
            - ${ANIME_SERIES_PATH}:/anime_series
        ports:
            - "${BAZARR_ANIME_HOST_PORT:-6002}:6767"
        logging: *default-logging
        restart: unless-stopped

# Movies/Shows/Anime Services
    radarr:
        image: lscr.io/linuxserver/radarr:latest
        container_name: radarr
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./radarr:/config
            - ${MOVIES_PATH}:/movies      
            - ${DOWNLOADS_PATH}:/downloads  
        ports:
            - "${RADARR_HOST_PORT:-6003}:7878"
        logging: *default-logging
        restart: unless-stopped

    radarr-anime:
        image: lscr.io/linuxserver/radarr:latest
        container_name: radarr-anime
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./radarr-anime:/config
            - ${ANIME_MOVIES_PATH}:/anime_movies        
            - ${DOWNLOADS_PATH}:/downloads  
        ports:
            - "${RADARR_ANIME_HOST_PORT:-6004}:7878"
        logging: *default-logging
        restart: unless-stopped

    sonarr:
        image: lscr.io/linuxserver/sonarr:latest
        container_name: sonarr
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./sonarr:/config
            - ${SHOWS_PATH}:/shows
            - ${DOWNLOADS_PATH}:/downloads  
        ports:
            - "${SONARR_HOST_PORT:-6005}:8989"
        logging: *default-logging
        restart: unless-stopped

    sonarr-anime:
        image: lscr.io/linuxserver/sonarr:latest
        container_name: sonarr-anime
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./sonarr-anime:/config
            - ${ANIME_SERIES_PATH}:/anime_series
            - ${DOWNLOADS_PATH}:/downloads  
        ports:
            - "${SONARR_ANIME_HOST_PORT:-6006}:8989"
        logging: *default-logging
        restart: unless-stopped
        
# Indexing Services - Flaresolverr for Cloudflare
    prowlarr:
        image: lscr.io/linuxserver/prowlarr:latest
        container_name: prowlarr
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./prowlarr:/config
        ports:
            - "${PROWLARR_HOST_PORT:-6007}:9696"
        logging: *default-logging
        restart: unless-stopped

# Quality Profile Configuration Service
    recyclarr:
        image: ghcr.io/recyclarr/recyclarr
        container_name: recyclarr
        environment:
            PUID: ${PUID}
            PGID: ${PGID}
            TZ: ${TZ}
        volumes:
            - ./recyclarr:/config
        logging: *default-logging
        restart: unless-stopped
